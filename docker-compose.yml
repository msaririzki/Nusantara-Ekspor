
services:
  app:
    image: "${COMPOSE_PROJECT_NAME:-nusantara-ekspor}-app:latest"
    build:
      context: .
      dockerfile: docker/python/Dockerfile
      network: host
    working_dir: /app/backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/.env:/app/backend/.env
      - ./backend/main.py:/app/backend/main.py:ro
      - ./backend/config.py:/app/backend/config.py:ro
      - ./backend/database.py:/app/backend/database.py:ro
      - ./backend/routers:/app/backend/routers:ro
      - ./backend/models:/app/backend/models:ro
      - ./backend/schemas:/app/backend/schemas:ro
      - ./backend/services:/app/backend/services:ro
      # Persist SQLite & uploaded images (bind mount agar data tetap di host)
      - ./backend/data:/app/backend/data
      - uploads-data:/app/backend/uploads
      # Share volume dengan nginx untuk membagikan file statis UI
      - frontend-dist:/usr/share/nginx/html
    environment:
      # Override DATABASE_URL ke folder data yang persistent
      DATABASE_URL: sqlite:////app/backend/data/db.sqlite
    restart: unless-stopped

  web:
    image: nginx:1.27-alpine
    ports:
      - "${WEB_PORT:-8002}:80"  # WEB_PORT dibaca dari root .env
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend-dist:/usr/share/nginx/html:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  frontend-dist:
  uploads-data:
