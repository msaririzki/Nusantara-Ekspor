

services:
  app:
    image: "${COMPOSE_PROJECT_NAME:-nusantara-ekspor}-app:latest"
    build:
      context: .
      dockerfile: docker/python/Dockerfile
      network: host
    working_dir: /app/backend
    environment:
      DATABASE_URL: "sqlite+aiosqlite:///./nusantara_ekspor.db"
    volumes:
      # .env dari host langsung di-mount
      - ./backend/.env:/app/backend/.env
      # SQLite database: persistent data
      - app-data:/app/backend
      # --- Kode Python di-mount dari host agar git pull langsung berpengaruh ---
      - ./backend/main.py:/app/backend/main.py:ro
      - ./backend/config.py:/app/backend/config.py:ro
      - ./backend/database.py:/app/backend/database.py:ro
      - ./backend/routers:/app/backend/routers:ro
      - ./backend/models:/app/backend/models:ro
      - ./backend/schemas:/app/backend/schemas:ro
      - ./backend/services:/app/backend/services:ro
      - ./backend/utils:/app/backend/utils:ro
    restart: unless-stopped

  web:
    image: nginx:1.27-alpine
    ports:
      - "${WEB_PORT:-8002}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Nginx serve file statis frontend dari volume yang sama
      - frontend-dist:/usr/share/nginx/html:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  app-data:
  frontend-dist:
